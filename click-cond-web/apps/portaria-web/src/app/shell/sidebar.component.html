<aside class="w-64 shrink-0 h-screen sticky top-0
              bg-graphite-200
              border-r border-white/10 p-5 flex flex-col">
  <div class="mb-8">
    <h2 class="font-display text-xl font-semibold tracking-tight">
      <span class="text-slate-100">Click</span>
      <span class="text-slate-300"> Portaria</span>
    </h2>
    <p class="text-[11px] text-slate-500 mt-0.5 uppercase tracking-widest">
      Web Console
    </p>
  </div>

  <nav class="flex-1 space-y-1">
    @for (item of nav; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-white/10 text-white border-accent/40"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl
               border border-transparent text-slate-400 hover:text-slate-100
               hover:bg-white/5 transition"
      >
        <span class="w-5 text-center text-accent">{{ item.icon }}</span>
        <span class="text-sm font-medium">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="pt-4 mt-4 border-t border-white/10">
    @if (auth.porteiroInfo(); as info) {
      <div class="flex items-center gap-2 mb-3">
        <div class="w-7 h-7 rounded-full bg-accent/20 border border-accent/30 flex items-center justify-center shrink-0">
          <span class="text-accent text-xs font-semibold">{{ info.nome.charAt(0).toUpperCase() }}</span>
        </div>
        <div class="min-w-0">
          <p class="text-xs font-medium text-slate-200 truncate">{{ info.nome }}</p>
          @if (info.turno) {
            <p class="text-[11px] text-accent">{{ info.turno }}</p>
          }
        </div>
      </div>
    }
    <button
      (click)="auth.logout()"
      class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-slate-400
             hover:text-red-400 hover:bg-red-400/10 transition"
    >
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sair
    </button>
  </div>
</aside>
